<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be Mine? 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
    font-family: 'Varela Round', sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
    position: relative;
    z-index: 10;
}

h1 {
    color: #d32f2f;
    font-size: 2.5rem;
    margin-bottom: 20px;
}

.gif-container img {
    width: 220px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.btn-container {
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    padding: 15px 30px;
    font-size: 1.2rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
}

#yesBtn {
    background-color: #4CAF50;
    color: white;
}

#noBtn {
    background-color: #f44336;
    color: white;
}

.sub-text {
    font-size: 1.2rem;
    color: #880e4f;
    margin-top: 15px;
    display: none;
}

.final-love {
    font-family: 'Pacifico', cursive;
    font-size: 3rem;
    margin-top: 25px;
    color: #ff1493;
    display: none;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493; }
    to { text-shadow: 0 0 20px #ff1493, 0 0 40px #ff69b4; }
}

@keyframes shake {
    0% { transform: translate(2px, 1px) rotate(0deg); }
    25% { transform: translate(-2px, -3px) rotate(-1deg); }
    50% { transform: translate(-3px, 2px) rotate(1deg); }
    75% { transform: translate(3px, 1px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1 id="question">Will you be my valentine? 💖</h1>

    <div class="gif-container">
        <img id="mainImage" src="https://media.tenor.com/b7N6E1ve5ioAAAAi/cute-bear.gif">
    </div>

    <div class="btn-container">
        <button id="yesBtn">Yes 😍</button>
        <button id="noBtn">No 😒</button>
    </div>

    <p class="sub-text" id="subText">
        You just made me the happiest person alive ❤️
    </p>

    <div class="final-love" id="finalLove">
        Bobo 💘 Krkr
    </div>
</div>

<script>
const yesBtn = document.getElementById('yesBtn');
const noBtn = document.getElementById('noBtn');
const question = document.getElementById('question');
const mainImage = document.getElementById('mainImage');
const subText = document.getElementById('subText');
const btnContainer = document.querySelector('.btn-container');
const finalLove = document.getElementById('finalLove');

let noCount = 0;
let runawayMode = false;
let currentFontSize = 1.2;

const noTexts = [
    "Are you sure? 😳",
    "Think again...",
    "Pookie please 🥺",
    "Why would you do this?",
    "I'm getting emotional...",
    "Last warning 😤",
    "You're breaking my heart 💔",
    "Stop clicking me 😭"
];

const sadImages = [
    "https://media.tenor.com/j-f2s8o5mZcAAAAi/bear-sad.gif",
    "https://media.tenor.com/2b2m4r10lJIAAAAi/sad-bear-cry.gif",
    "https://media.tenor.com/eqJD2k6hM5sAAAAi/sad-bear.gif",
    "https://media.tenor.com/Y2a6h9l0wBEAAAAi/sad-cat.gif"
];

const happyImages = [
    "https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-hugs.gif",
    "https://media.tenor.com/0AVbKGY_MxMAAAAi/cute-love.gif"
];

function randomSad() {
    return sadImages[Math.floor(Math.random() * sadImages.length)];
}

function randomHappy() {
    return happyImages[Math.floor(Math.random() * happyImages.length)];
}

noBtn.addEventListener('click', () => {
    noCount++;

    noBtn.innerText = noTexts[noCount % noTexts.length];

    currentFontSize += 1.3;
    yesBtn.style.fontSize = currentFontSize + "rem";
    yesBtn.style.padding = `${currentFontSize * 0.8}rem ${currentFontSize * 1.5}rem`;

    mainImage.src = randomSad();

    document.body.style.animation = "shake 0.3s";
    setTimeout(() => document.body.style.animation = "", 300);

    if (noCount >= 4) {
        runawayMode = true;
        noBtn.style.position = "absolute";
    }
});

document.addEventListener('mousemove', (e) => {
    if (!runawayMode) return;

    const rect = noBtn.getBoundingClientRect();
    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width / 2),
        e.clientY - (rect.top + rect.height / 2)
    );

    if (distance < 120) {
        const randomX = Math.random() * (window.innerWidth - 100);
        const randomY = Math.random() * (window.innerHeight - 50);

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }
});

yesBtn.addEventListener('click', () => {
    question.innerHTML = "Processing your answer... 💭";
    btnContainer.style.display = "none";

    setTimeout(() => {
        question.innerHTML = "I knew you'd say YES 😍💖";
        mainImage.src = randomHappy();
        subText.style.display = "block";
        finalLove.style.display = "block";

        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        setTimeout(() => {
            confetti({ particleCount: 300, spread: 160, origin: { y: 0.6 } });
        }, 400);

    }, 1500);
});
</script>

</body>
</html>
