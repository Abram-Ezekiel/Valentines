<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Varela Round', sans-serif;
            overflow: hidden; /* Prevents scrolling when button gets huge */
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #d32f2f;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .gif-container img {
            width: 200px; /* Adjust size of the bear */
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap; 
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Varela Round', sans-serif;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #4CAF50; /* Green */
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #noBtn {
            background-color: #f44336; /* Red */
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* The message under the success text */
        .sub-text {
            font-size: 1.2rem;
            color: #880e4f;
            margin-top: 10px;
            display: none;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">Will you be my Valentine? 💖</h1>
        
        <div class="gif-container">
            <img id="mainImage" src="https://media.tenor.com/b7N6E1ve5ioAAAAi/cute-bear.gif" alt="Cute Bear">
        </div>

        <div class="btn-container">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
        
        <p class="sub-text" id="subText">You just made me the happiest person! ❤️</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const mainImage = document.getElementById('mainImage');
        const subText = document.getElementById('subText');
        const btnContainer = document.querySelector('.btn-container');

        // These are the exact texts from the video
        const noTexts = [
            "Are you positive? 🤨", 
            "Pookie please... 🥺", 
            "If you say no, I will be really sad...", 
            "Don't do this to me...", 
            "Last chance! 😭", 
            "You're breaking my heart 💔",
            "I'm gonna cry..."
        ];

        // URLs for the different emotional states of the bear
        // You can swap these links if you find other GIFs you like better
        const sadImages = [
            "https://media.tenor.com/j-f2s8o5mZcAAAAi/bear-sad.gif",
            "https://media.tenor.com/2b2m4r10lJIAAAAi/sad-bear-cry.gif",
            "https://media.tenor.com/eqJD2k6hM5sAAAAi/sad-bear.gif"
        ];
        
        const successImage = "https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-hugs.gif";

        let noCount = 0;
        let currentFontSize = 1.2; // Initial font size in rem

        noBtn.addEventListener('click', () => {
            noCount++;
            
            // 1. Change the "No" button text
            // We use modulo (%) to loop back to the start if the user clicks too many times
            noBtn.innerText = noTexts[noCount % noTexts.length];

            // 2. Make the "Yes" button BIGGER
            currentFontSize += 1.5; // Grow faster
            yesBtn.style.fontSize = `${currentFontSize}rem`;
            
            // Optional: increase padding too so it doesn't look squished
            yesBtn.style.padding = `${currentFontSize * 0.8}rem ${currentFontSize * 1.5}rem`;

            // 3. Change the image to a sad bear
            const randomSadImage = sadImages[Math.floor(Math.random() * sadImages.length)];
            mainImage.src = randomSadImage;
        });

        yesBtn.addEventListener('click', () => {
            // 1. Change the heading
            question.innerHTML = "Knew you would say yes! 🎉";
            
            // 2. Change the image to happy/kissing
            mainImage.src = successImage;
            
            // 3. Hide the buttons
            btnContainer.style.display = 'none';
            
            // 4. Show sweet sub-text
            subText.style.display = 'block';

            // 5. Trigger Confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
            
            // Fire more confetti after a delay
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.6 }
                });
            }, 500);
        });
    </script>
</body>
</html>
